<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retro Football</title>
<style>
body{
    margin:0;
    background:#0b6623;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
}
h1{
    margin-top:20px;
}
canvas{
    background:#1f8b3a;
    border:4px solid white;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Retro Football</h1>
<p>Use Arrow Keys to Move • Space to Throw</p>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
    x:100,
    y:200,
    speed:4
};

let ball = {
    x:0,
    y:0,
    dx:0,
    dy:0,
    active:false
};

const keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function throwBall(){
    if(!ball.active){
        ball.x = player.x + 20;
        ball.y = player.y;
        ball.dx = 6;
        ball.dy = 0;
        ball.active = true;
    }
}

function update(){

    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;

    if(keys[" "]){
        throwBall();
    }

    if(ball.active){
        ball.x += ball.dx;
        ball.y += ball.dy;

        if(ball.x > canvas.width){
            ball.active = false;
        }
    }
}

function drawField(){
    ctx.fillStyle = "#1f8b3a";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="white";

    for(let i=0;i<canvas.width;i+=80){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i,canvas.height);
        ctx.stroke();
    }
}

function drawPlayer(){
    ctx.fillStyle="yellow";
    ctx.fillRect(player.x, player.y, 20, 20);
}

function drawBall(){
    if(ball.active){
        ctx.fillStyle="brown";
        ctx.fillRect(ball.x, ball.y, 8, 8);
    }
}

function gameLoop(){
    update();
    drawField();
    drawPlayer();
    drawBall();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
